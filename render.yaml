services:
  - type: web
    name: grocery-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application
    healthCheckPath: /api/grocery/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: FRONTEND_URL
        value: https://grocery-bud-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://grocery-bud-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://grocery-bud-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: grocery-db
          property: connectionString

  - type: web
    name: grocery-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://grocery-backend.onrender.com/api/grocery

databases:
  - name: grocery-db
    plan: free